name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_ENV: development
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
  E2E_VENDOR_PHONE: ${{ secrets.E2E_VENDOR_PHONE }}
  E2E_BASE_URL: http://localhost:3000

jobs:
  # ── Step 1: TypeScript + lint check (fast fail) ─────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Step 2: Unit tests ──────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage --ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 7

  # ── Step 3: E2E tests (depends on type-check passing) ──────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [type-check]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build
        env:
          # Build needs these for Supabase client init
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run E2E tests
        run: npx playwright test --reporter=github,html,json
        env:
          CI: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-results.json
            test-results/
          retention-days: 14

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🧪 E2E Test Results\n\n';

            try {
              const results = JSON.parse(fs.readFileSync('e2e-results.json', 'utf8'));
              const stats = results.stats;
              const passed = stats.expected || 0;
              const failed = stats.unexpected || 0;
              const skipped = stats.skipped || 0;
              const total = passed + failed + skipped;

              const emoji = failed === 0 ? '✅' : '❌';
              summary += `${emoji} **${passed}/${total} passed** | ${failed} failed | ${skipped} skipped\n\n`;
              summary += `⏱️ Duration: ${Math.round(stats.duration / 1000)}s\n\n`;

              if (failed > 0) {
                summary += '### Failed Tests\n\n';
                for (const suite of results.suites || []) {
                  for (const spec of suite.specs || []) {
                    for (const test of spec.tests || []) {
                      if (test.status === 'unexpected') {
                        summary += `- ❌ \`${spec.title}\` → ${test.results?.[0]?.error?.message?.slice(0, 100) || 'Unknown error'}\n`;
                      }
                    }
                  }
                }
              }
            } catch {
              summary += '⚠️ Could not parse test results\n';
            }

            summary += '\n📎 Full report: See **playwright-report** artifact\n';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('🧪 E2E Test Results'));
            const body = summary;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
